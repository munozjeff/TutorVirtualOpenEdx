# ── HTTP → redirige a HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name tutor.local.openedx.io;
    return 301 https://$host:4443$request_uri;
}

# ── HTTPS (LTI en iframe requiere SameSite=None;Secure → necesita HTTPS) ───────
server {
    listen 443 ssl;
    server_name tutor.local.openedx.io;

    ssl_certificate     /etc/nginx/certs/tutor.local.openedx.io.pem;
    ssl_certificate_key /etc/nginx/certs/tutor.local.openedx.io-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # NO enviar X-Frame-Options para que Open edX pueda embeber en iframe
    # (omitir la cabecera es correcto — no agregar DENY ni SAMEORIGIN)

    # Frontend (React/Vite) corriendo en Host:5173
    location / {
        proxy_pass http://172.17.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # HMR support para Vite (WebSocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API corriendo en Host:8000
    location /api/ {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Endpoints LTI
    location /lti/ {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
